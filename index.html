<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 18 | Friday Arrival</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mesh-gradient"></div>
    
    <div class="container">
        <header>
            <p class="subtitle">A JOURNEY 6 YEARS IN THE MAKING</p>
            <h1 id="timer">00:00:00</h1>
        </header>

        <div class="main-visual">
            <div class="glass-sphere">18</div>
        </div>

        <nav class="days-nav" id="dayNodes"></nav>
    </div>

    <div id="modal" class="modal hidden">
        <div class="glass-card">
            <h2 id="modalTitle">Fragment of Us</h2>
            <p id="modalText"></p>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>

</html>
