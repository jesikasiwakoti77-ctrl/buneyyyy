<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 18 | The Friday Arrival</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mesh-gradient"></div>
    <div class="container">
        <header>
            <p class="subtitle">A 6-YEAR JOURNEY • 9 MONTHS AT HOME</p>
            <h1 id="timer">00:00:00</h1>
        </header>
        <div class="main-visual">
            <div class="glass-sphere" id="sphere">18</div>
        </div>
        <div class="days-nav" id="dayNodes"></div>
        <p class="instruction">Tap the day's letter to unlock</p>
    </div>
    <div id="modal" class="modal hidden">
        <div class="glass-card">
            <h2 id="modalTitle">Fragment of Us</h2>
            <div class="separator"></div>
            <p id="modalText"></p>
            <button class="close-btn" onclick="closeModal()">Close Letter</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
